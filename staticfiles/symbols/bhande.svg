<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3410;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pot body -->
  <path d="M40,80 Q40,160 100,160 Q160,160 160,80 Q160,60 100,60 Q40,60 40,80" 
        fill="url(#potGrad)" stroke="#5D3A1A" stroke-width="3" />
  
  <!-- Pot rim -->
  <ellipse cx="100" cy="65" rx="60" ry="12" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" />
  
  <!-- Pot inner -->
  <ellipse cx="100" cy="67" rx="50" ry="8" fill="#4A2A0A" />
  
  <!-- Lid -->
  <ellipse cx="100" cy="62" rx="45" ry="10" fill="#8B4513" stroke="#5D3A1A" stroke-width="2" />
  
  <!-- Lid handle -->
  <circle cx="100" cy="52" r="8" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" />
  <circle cx="100" cy="52" r="4" fill="#C4A574" />
  
  <!-- Decorative band -->
  <path d="M45,100 Q100,110 155,100" fill="none" stroke="#FFD700" stroke-width="3" />
  <path d="M42,120 Q100,130 158,120" fill="none" stroke="#FFD700" stroke-width="2" />
  
  <!-- Handles -->
  <path d="M40,90 Q25,90 25,105 Q25,120 40,120" fill="none" stroke="#5D3A1A" stroke-width="6" stroke-linecap="round" />
  <path d="M160,90 Q175,90 175,105 Q175,120 160,120" fill="none" stroke="#5D3A1A" stroke-width="6" stroke-linecap="round" />
</svg>
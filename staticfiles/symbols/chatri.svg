<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="umbrellaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D3A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Umbrella canopy -->
  <path d="M30,90 Q100,20 170,90 L160,90 Q100,40 40,90 Z" fill="url(#umbrellaGrad)" />
  
  <!-- Canopy segments -->
  <path d="M100,35 L40,90" stroke="#1E3A8A" stroke-width="2" />
  <path d="M100,35 L65,70" stroke="#1E3A8A" stroke-width="2" />
  <path d="M100,35 L135,70" stroke="#1E3A8A" stroke-width="2" />
  <path d="M100,35 L160,90" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Umbrella edge decorations -->
  <circle cx="40" cy="90" r="4" fill="#FFD700" />
  <circle cx="70" cy="75" r="4" fill="#FFD700" />
  <circle cx="100" cy="70" r="4" fill="#FFD700" />
  <circle cx="130" cy="75" r="4" fill="#FFD700" />
  <circle cx="160" cy="90" r="4" fill="#FFD700" />
  
  <!-- Handle -->
  <line x1="100" y1="70" x2="100" y2="170" stroke="url(#handleGrad)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Handle curve -->
  <path d="M100,170 Q80,170 80,155" fill="none" stroke="url(#handleGrad)" stroke-width="6" stroke-linecap="round" />
</svg>
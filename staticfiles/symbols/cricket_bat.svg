<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="batGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A574;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gripGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bat blade -->
  <rect x="70" y="30" width="60" height="120" rx="5" ry="5" fill="url(#batGrad)" stroke="#A0522D" stroke-width="2" />
  
  <!-- Bat face -->
  <rect x="75" y="35" width="50" height="110" rx="3" ry="3" fill="#F5DEB3" stroke="#DEB887" stroke-width="1" />
  
  <!-- Bat spine -->
  <line x1="100" y1="35" x2="100" y2="145" stroke="#CD853F" stroke-width="3" />
  
  <!-- Bat edges -->
  <line x1="75" y1="80" x2="125" y2="80" stroke="#CD853F" stroke-width="1" />
  
  <!-- Handle -->
  <rect x="88" y="145" width="24" height="45" rx="3" ry="3" fill="#8B4513" stroke="#5D3A1A" stroke-width="2" />
  
  <!-- Grip wrapping -->
  <path d="M88,150 Q100,155 112,150" fill="none" stroke="url(#gripGrad)" stroke-width="3" />
  <path d="M88,158 Q100,163 112,158" fill="none" stroke="url(#gripGrad)" stroke-width="3" />
  <path d="M88,166 Q100,171 112,166" fill="none" stroke="url(#gripGrad)" stroke-width="3" />
  <path d="M88,174 Q100,179 112,174" fill="none" stroke="url(#gripGrad)" stroke-width="3" />
  <path d="M88,182 Q100,187 112,182" fill="none" stroke="url(#gripGrad)" stroke-width="3" />
  
  <!-- Handle top -->
  <rect x="85" y="143" width="30" height="5" rx="2" ry="2" fill="#5D3A1A" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main bag body -->
  <rect x="50" y="60" width="100" height="110" rx="10" ry="10" fill="url(#bagGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Bag flap -->
  <path d="M50,60 Q100,40 150,60" fill="#1E3A8A" stroke="#0F1F4D" stroke-width="2" />
  
  <!-- Front pocket -->
  <rect x="65" y="100" width="70" height="40" rx="5" ry="5" fill="#3A5FCD" stroke="#2A4F9D" stroke-width="2" />
  
  <!-- Pocket zipper -->
  <line x1="75" y1="110" x2="125" y2="110" stroke="#FFD700" stroke-width="3" />
  <circle cx="125" cy="110" r="4" fill="#FFD700" />
  
  <!-- Top handle -->
  <path d="M75,60 Q75,35 100,35 Q125,35 125,60" fill="none" stroke="#2A4F9D" stroke-width="8" stroke-linecap="round" />
  
  <!-- Shoulder straps -->
  <path d="M60,65 Q40,100 60,170" fill="none" stroke="#2A4F9D" stroke-width="6" stroke-linecap="round" />
  <path d="M140,65 Q160,100 140,170" fill="none" stroke="#2A4F9D" stroke-width="6" stroke-linecap="round" />
</svg>
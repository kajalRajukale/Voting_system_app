<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="clayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="flameGrad" cx="50%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Glow -->
  <circle cx="100" cy="80" r="60" fill="url(#glowGrad)" />
  
  <!-- Flame -->
  <ellipse cx="100" cy="80" rx="12" ry="25" fill="url(#flameGrad)" />
  <ellipse cx="100" cy="75" rx="6" ry="15" fill="#FFFF00" />
  
  <!-- Lamp base -->
  <ellipse cx="100" cy="130" rx="50" ry="15" fill="url(#clayGrad)" />
  <rect x="60" y="120" width="80" height="15" fill="url(#clayGrad)" />
  <ellipse cx="100" cy="120" rx="40" ry="10" fill="#DEB887" />
  
  <!-- Wick -->
  <rect x="98" y="95" width="4" height="25" fill="#4A3728" />
</svg>
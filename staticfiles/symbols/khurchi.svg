<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="chairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="legGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chair back -->
  <rect x="50" y="30" width="100" height="80" rx="5" ry="5" fill="url(#chairGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Back slats -->
  <rect x="65" y="40" width="8" height="60" rx="2" ry="2" fill="#3A5FCD" />
  <rect x="85" y="40" width="8" height="60" rx="2" ry="2" fill="#3A5FCD" />
  <rect x="105" y="40" width="8" height="60" rx="2" ry="2" fill="#3A5FCD" />
  <rect x="125" y="40" width="8" height="60" rx="2" ry="2" fill="#3A5FCD" />
  
  <!-- Chair seat -->
  <rect x="45" y="108" width="110" height="15" rx="3" ry="3" fill="url(#chairGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Front legs -->
  <rect x="50" y="120" width="10" height="55" fill="url(#legGrad)" stroke="#A0522D" stroke-width="1" />
  <rect x="140" y="120" width="10" height="55" fill="url(#legGrad)" stroke="#A0522D" stroke-width="1" />
  
  <!-- Back legs -->
  <rect x="55" y="30" width="8" height="90" fill="url(#legGrad)" stroke="#A0522D" stroke-width="1" />
  <rect x="137" y="30" width="8" height="90" fill="url(#legGrad)" stroke="#A0522D" stroke-width="1" />
  
  <!-- Leg caps -->
  <rect x="48" y="172" width="14" height="4" rx="2" ry="2" fill="#8B4513" />
  <rect x="138" y="172" width="14" height="4" rx="2" ry="2" fill="#8B4513" />
</svg>
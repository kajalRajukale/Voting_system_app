<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="dusterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Duster body -->
  <rect x="40" y="60" width="120" height="60" rx="8" ry="8" fill="url(#dusterGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Handle -->
  <rect x="65" y="30" width="70" height="35" rx="5" ry="5" fill="#3A5FCD" stroke="#2A4F9D" stroke-width="2" />
  
  <!-- Handle grip lines -->
  <line x1="75" y1="40" x2="75" y2="58" stroke="#2A4F9D" stroke-width="2" />
  <line x1="85" y1="40" x2="85" y2="58" stroke="#2A4F9D" stroke-width="2" />
  <line x1="95" y1="40" x2="95" y2="58" stroke="#2A4F9D" stroke-width="2" />
  <line x1="105" y1="40" x2="105" y2="58" stroke="#2A4F9D" stroke-width="2" />
  <line x1="115" y1="40" x2="115" y2="58" stroke="#2A4F9D" stroke-width="2" />
  <line x1="125" y1="40" x2="125" y2="58" stroke="#2A4F9D" stroke-width="2" />
  
  <!-- Felt bottom -->
  <rect x="40" y="120" width="120" height="25" rx="4" ry="4" fill="#DEB887" stroke="#CD853F" stroke-width="1" />
  
  <!-- Felt texture lines -->
  <line x1="50" y1="126" x2="50" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="65" y1="126" x2="65" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="80" y1="126" x2="80" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="95" y1="126" x2="95" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="110" y1="126" x2="110" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="125" y1="126" x2="125" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="140" y1="126" x2="140" y2="140" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  
  <!-- Side grip -->
  <rect x="35" y="70" width="8" height="40" rx="3" ry="3" fill="#2A4F9D" />
  <rect x="157" y="70" width="8" height="40" rx="3" ry="3" fill="#2A4F9D" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="85" fill="url(#bgGrad)" />
  
  <!-- Om symbol -->
  <text x="100" y="120" font-family="serif" font-size="80" fill="#800080" text-anchor="middle" font-weight="bold">ॐ</text>
  
  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FFD700" stroke-width="3" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="5,5" />
</svg>
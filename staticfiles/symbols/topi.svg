<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cap brim -->
  <ellipse cx="100" cy="130" rx="70" ry="15" fill="url(#capGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Cap dome -->
  <path d="M30,130 Q30,60 100,50 Q170,60 170,130" fill="url(#capGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Golden band -->
  <rect x="30" y="115" width="140" height="15" fill="url(#bandGrad)" />
  
  <!-- Band buckle -->
  <rect x="92" y="113" width="16" height="19" rx="2" ry="2" fill="#B8860B" stroke="#8B6914" stroke-width="1" />
  
  <!-- Cap button -->
  <circle cx="100" cy="55" r="8" fill="#FFD700" stroke="#B8860B" stroke-width="1" />
  
  <!-- Cap panels -->
  <path d="M100,55 L30,130" stroke="#1E3A8A" stroke-width="1" opacity="0.5" />
  <path d="M100,55 L170,130" stroke="#1E3A8A" stroke-width="1" opacity="0.5" />
  <path d="M100,55 L100,130" stroke="#1E3A8A" stroke-width="1" opacity="0.5" />
</svg>
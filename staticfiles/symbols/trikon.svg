<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Triangle -->
  <polygon points="100,25 180,175 20,175" 
           fill="url(#triGrad)" stroke="#CC3700" stroke-width="3" />
  
  <!-- Inner triangle -->
  <polygon points="100,60 155,160 45,160" 
           fill="none" stroke="#FFA07A" stroke-width="2" opacity="0.5" />
  
  <!-- Center circle -->
  <circle cx="100" cy="130" r="20" fill="#FFD700" stroke="#FFA500" stroke-width="2" />
  <circle cx="100" cy="130" r="10" fill="#FF8C00" />
  
  <!-- Corner decorations -->
  <circle cx="100" cy="35" r="6" fill="#FFD700" />
  <circle cx="30" cy="170" r="6" fill="#FFD700" />
  <circle cx="170" cy="170" r="6" fill="#FFD700" />
</svg>
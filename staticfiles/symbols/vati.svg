<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A9A9A9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bowlInner" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#D3D3D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A9A9A9;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Bowl shadow -->
  <ellipse cx="100" cy="160" rx="60" ry="10" fill="#808080" opacity="0.3" />
  
  <!-- Bowl body -->
  <path d="M30,100 Q30,160 100,160 Q170,160 170,100 Q170,80 100,80 Q30,80 30,100" 
        fill="url(#bowlGrad)" stroke="#808080" stroke-width="2" />
  
  <!-- Bowl inner -->
  <ellipse cx="100" cy="100" rx="65" ry="20" fill="url(#bowlInner)" stroke="#A9A9A9" stroke-width="1" />
  
  <!-- Bowl rim -->
  <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="#C0C0C0" stroke-width="4" />
  
  <!-- Reflection -->
  <ellipse cx="80" cy="115" rx="20" ry="8" fill="#FFFFFF" opacity="0.3" />
  
  <!-- Bowl base -->
  <ellipse cx="100" cy="155" rx="30" ry="6" fill="#A9A9A9" stroke="#808080" stroke-width="1" />
</svg>
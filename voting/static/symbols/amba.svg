<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mangoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mango body -->
  <path d="M100,50 Q140,50 150,90 Q160,130 130,160 Q100,190 70,160 Q40,130 50,90 Q60,50 100,50" 
        fill="url(#mangoGrad)" stroke="#CC7000" stroke-width="2" />
  
  <!-- Mango blush -->
  <ellipse cx="80" cy="100" rx="25" ry="30" fill="#FF6347" opacity="0.3" />
  
  <!-- Stem -->
  <path d="M100,50 Q100,30 110,20" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round" />
  
  <!-- Leaf -->
  <path d="M110,20 Q140,10 150,25 Q140,40 110,35 Q100,25 110,20" fill="url(#leafGrad)" stroke="#006400" stroke-width="1" />
  
  <!-- Leaf vein -->
  <path d="M112,22 Q130,18 145,25" fill="none" stroke="#006400" stroke-width="1" />
</svg>
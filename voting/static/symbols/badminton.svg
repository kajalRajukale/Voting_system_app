<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="racketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Racket head -->
  <ellipse cx="100" cy="70" rx="55" ry="65" fill="none" stroke="url(#racketGrad)" stroke-width="8" />
  
  <!-- Strings horizontal -->
  <line x1="55" y1="40" x2="145" y2="40" stroke="#90EE90" stroke-width="1" />
  <line x1="50" y1="55" x2="150" y2="55" stroke="#90EE90" stroke-width="1" />
  <line x1="48" y1="70" x2="152" y2="70" stroke="#90EE90" stroke-width="1" />
  <line x1="50" y1="85" x2="150" y2="85" stroke="#90EE90" stroke-width="1" />
  <line x1="55" y1="100" x2="145" y2="100" stroke="#90EE90" stroke-width="1" />
  
  <!-- Strings vertical -->
  <line x1="70" y1="10" x2="70" y2="130" stroke="#90EE90" stroke-width="1" />
  <line x1="85" y1="5" x2="85" y2="135" stroke="#90EE90" stroke-width="1" />
  <line x1="100" y1="5" x2="100" y2="135" stroke="#90EE90" stroke-width="1" />
  <line x1="115" y1="5" x2="115" y2="135" stroke="#90EE90" stroke-width="1" />
  <line x1="130" y1="10" x2="130" y2="130" stroke="#90EE90" stroke-width="1" />
  
  <!-- Throat -->

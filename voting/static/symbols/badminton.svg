  <!-- Handle grip -->
  <path d="M92,150 Q100,155 108,150" fill="none" stroke="#228B22" stroke-width="2" />
  <path d="M92,158 Q100,163 108,158" fill="none" stroke="#228B22" stroke-width="2" />
  <path d="M92,166 Q100,171 108,166" fill="none" stroke="#228B22" stroke-width="2" />
  <path d="M92,174 Q100,179 108,174" fill="none" stroke="#228B22" stroke-width="2" />
</svg>
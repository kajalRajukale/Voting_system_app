<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bottle body -->
  <rect x="65" y="70" width="70" height="90" rx="10" ry="10" fill="url(#bottleGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Bottle neck -->
  <rect x="85" y="40" width="30" height="35" rx="3" ry="3" fill="url(#bottleGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Bottle opening -->
  <ellipse cx="100" cy="40" rx="15" ry="5" fill="#4169E1" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Nipple -->
  <ellipse cx="100" cy="30" rx="12" ry="12" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2" />
  <ellipse cx="100" cy="25" rx="5" ry="5" fill="#FF69B4" />
  
  <!-- Measurement marks -->
  <line x1="70" y1="90" x2="80" y2="90" stroke="#FFFFFF" stroke-width="1" />
  <line x1="70" y1="100" x2="85" y2="100" stroke="#FFFFFF" stroke-width="1" />
  <line x1="70" y1="110" x2="80" y2="110" stroke="#FFFFFF" stroke-width="1" />
  <line x1="70" y1="120" x2="85" y2="120" stroke="#FFFFFF" stroke-width="1" />
  <line x1="70" y1="130" x2="80" y2="130" stroke="#FFFFFF" stroke-width="1" />
  <line x1="70" y1="140" x2="85" y2="140" stroke="#FFFFFF" stroke-width="1" />
  
  <!-- Liquid level -->
  <rect x="67" y="110" width="66" height="48" rx="8" ry="8" fill="#87CEEB" opacity="0.5" />
  
  <!-- Grip rings -->
  <ellipse cx="100" cy="75" rx="32" ry="3" fill="none" stroke="#1E3A8A" stroke-width="1" />
  <ellipse cx="100" cy="82" rx="32" ry="3" fill="none" stroke="#1E3A8A" stroke-width="1" />
  
  <!-- Highlight -->
  <ellipse cx="80" cy="100" rx="8" ry="20" fill="#FFFFFF" opacity="0.2" />
</svg>
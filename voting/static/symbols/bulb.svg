<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FFFF00;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFF00;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="bulbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFF99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Glow -->
  <circle cx="100" cy="80" r="80" fill="url(#glowGrad)" />
  
  <!-- Light rays -->
  <line x1="100" y1="10" x2="100" y2="30" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
  <line x1="150" y1="30" x2="140" y2="45" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
  <line x1="170" y1="80" x2="150" y2="80" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
  <line x1="50" y1="30" x2="60" y2="45" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="80" x2="50" y2="80" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
  
  <!-- Bulb glass -->
  <path d="M60,90 Q60,30 100,25 Q140,30 140,90 Q140,110 130,120 L130,140 Q130,150 120,150 L80,150 Q70,150 70,140 L70,120 Q60,110 60,90" 
        fill="url(#bulbGrad)" stroke="#FFA500" stroke-width="2" />
  
  <!-- Filament -->
  <path d="M90,100 Q95,80 100,100 Q105,80 110,100" fill="none" stroke="#FF8C00" stroke-width="2" />
  
  <!-- Base -->
  <rect x="75" y="150" width="50" height="10" rx="2" ry="2" fill="#C0C0C0" stroke="#808080" stroke-width="1" />
  <rect x="78" y="160" width="44" height="8" rx="2" ry="2" fill="#A9A9A9" stroke="#808080" stroke-width="1" />
  <rect x="82" y="168" width="36" height="8" rx="3" ry="3" fill="#808080" stroke="#606060" stroke-width="1" />
  
  <!-- Screw threads -->
  <line x1="75" y1="155" x2="125" y2="155" stroke="#808080" stroke-width="1" />
  <line x1="78" y1="163" x2="122" y2="163" stroke="#808080" stroke-width="1" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Key head (round) -->
  <circle cx="100" cy="70" r="35" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="3" />
  <circle cx="100" cy="70" r="20" fill="#FFD700" stroke="#DAA520" stroke-width="2" />
  <circle cx="100" cy="70" r="10" fill="#FFEC8B" />
  
  <!-- Key shaft -->
  <rect x="94" y="105" width="12" height="65" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="2" />
  
  <!-- Key teeth -->
  <rect x="106" y="140" width="15" height="8" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="1" />
  <rect x="106" y="155" width="12" height="8" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="1" />
  <rect x="106" y="170" width="10" height="8" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="1" />
  
  <!-- Decorative pattern on head -->
  <path d="M85,70 Q92,60 100,70 Q108,60 115,70" fill="none" stroke="#B8860B" stroke-width="2" />
  <path d="M85,75 Q92,85 100,75 Q108,85 115,75" fill="none" stroke="#B8860B" stroke-width="2" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="ballGrad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Ball shadow -->
  <ellipse cx="105" cy="165" rx="50" ry="10" fill="#808080" opacity="0.3" />
  
  <!-- Ball -->
  <circle cx="100" cy="100" r="55" fill="url(#ballGrad)" stroke="#4A2A0A" stroke-width="2" />
  
  <!-- Ball seam -->
  <path d="M50,75 Q100,60 150,75" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <path d="M50,125 Q100,140 150,125" fill="none" stroke="#FFFFFF" stroke-width="2" />
  
  <!-- Seam stitching -->
  <line x1="60" y1="78" x2="62" y2="82" stroke="#FFFFFF" stroke-width="1" />
  <line x1="75" y1="72" x2="77" y2="76" stroke="#FFFFFF" stroke-width="1" />
  <line x1="90" y1="68" x2="92" y2="72" stroke="#FFFFFF" stroke-width="1" />
  <line x1="108" y1="68" x2="110" y2="72" stroke="#FFFFFF" stroke-width="1" />
  <line x1="123" y1="72" x2="125" y2="76" stroke="#FFFFFF" stroke-width="1" />
  <line x1="138" y1="78" x2="140" y2="82" stroke="#FFFFFF" stroke-width="1" />
  
  <line x1="60" y1="122" x2="62" y2="118" stroke="#FFFFFF" stroke-width="1" />
  <line x1="75" y1="128" x2="77" y2="124" stroke="#FFFFFF" stroke-width="1" />
  <line x1="90" y1="132" x2="92" y2="128" stroke="#FFFFFF" stroke-width="1" />
  <line x1="108" y1="132" x2="110" y2="128" stroke="#FFFFFF" stroke-width="1" />
  <line x1="123" y1="128" x2="125" y2="124" stroke="#FFFFFF" stroke-width="1" />
  <line x1="138" y1="122" x2="140" y2="118" stroke="#FFFFFF" stroke-width="1" />
  
  <!-- Highlight -->
  <ellipse cx="80" cy="75" rx="15" ry="10" fill="#FFFFFF" opacity="0.2" transform="rotate(-30 80 75)" />
</svg>
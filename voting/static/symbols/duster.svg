<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="dusterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Duster body -->
  <rect x="40" y="70" width="120" height="50" rx="8" ry="8" fill="url(#dusterGrad)" stroke="#1E3A8A" stroke-width="2" />
  
  <!-- Handle -->
  <rect x="70" y="40" width="60" height="35" rx="5" ry="5" fill="#3A5FCD" stroke="#2A4F9D" stroke-width="2" />
  
  <!-- Handle grip lines -->
  <line x1="80" y1="50" x2="80" y2="68" stroke="#2A4F9D" stroke-width="2" />
  <line x1="90" y1="50" x2="90" y2="68" stroke="#2A4F9D" stroke-width="2" />
  <line x1="100" y1="50" x2="100" y2="68" stroke="#2A4F9D" stroke-width="2" />
  <line x1="110" y1="50" x2="110" y2="68" stroke="#2A4F9D" stroke-width="2" />
  <line x1="120" y1="50" x2="120" y2="68" stroke="#2A4F9D" stroke-width="2" />
  
  <!-- Felt bottom -->
  <rect x="40" y="120" width="120" height="20" rx="4" ry="4" fill="#DEB887" stroke="#CD853F" stroke-width="1" />
  
  <!-- Felt texture lines -->
  <line x1="50" y1="125" x2="50" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="70" y1="125" x2="70" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="90" y1="125" x2="90" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="110" y1="125" x2="110" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="130" y1="125" x2="130" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
  <line x1="150" y1="125" x2="150" y2="135" stroke="#CD853F" stroke-width="1" opacity="0.5" />
</svg>
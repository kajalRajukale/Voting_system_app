<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="eraserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Eraser shadow -->
  <rect x="42" y="142" width="116" height="10" rx="3" ry="3" fill="#808080" opacity="0.3" />
  
  <!-- Eraser body -->
  <rect x="40" y="60" width="120" height="80" rx="5" ry="5" fill="url(#eraserGrad)" stroke="#FF1493" stroke-width="2" />
  
  <!-- Eraser top face -->
  <rect x="40" y="60" width="120" height="10" rx="5" ry="5" fill="#FFC0CB" />
  
  <!-- Eraser side face -->
  <rect x="155" y="60" width="5" height="80" fill="#FF1493" />
  
  <!-- Brand label -->
  <rect x="55" y="80" width="90" height="30" rx="3" ry="3" fill="#FFFFFF" opacity="0.7" />
  <text x="100" y="100" font-family="Arial" font-size="12" fill="#FF1493" text-anchor="middle" font-weight="bold">ERASER</text>
  
  <!-- Wear marks -->
  <ellipse cx="70" cy="125" rx="15" ry="5" fill="#FFB6C1" opacity="0.5" />
  <ellipse cx="120" cy="128" rx="10" ry="4" fill="#FFB6C1" opacity="0.5" />
  
  <!-- Corner wear -->
  <path d="M40,60 Q45,65 40,70" fill="#FFC0CB" />
  <path d="M160,60 Q155,65 160,70" fill="#FF1493" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3410;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="leafGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Tree trunk -->
  <rect x="90" y="120" width="20" height="60" fill="url(#trunkGrad)" stroke="#5D3A1A" stroke-width="2" />
  
  <!-- Roots -->
  <path d="M90,180 Q70,185 60,175" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round" />
  <path d="M110,180 Q130,185 140,175" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round" />
  
  <!-- Tree canopy layers -->
  <ellipse cx="100" cy="70" rx="60" ry="50" fill="url(#leafGrad)" />
  <ellipse cx="80" cy="60" rx="40" ry="35" fill="#3CB371" />
  <ellipse cx="120" cy="65" rx="45" ry="40" fill="#2E8B57" />
  <ellipse cx="100" cy="50" rx="35" ry="30" fill="#32CD32" />
  
  <!-- Leaf details -->
  <circle cx="70" cy="55" r="8" fill="#228B22" opacity="0.5" />
  <circle cx="130" cy="60" r="10" fill="#228B22" opacity="0.5" />
  <circle cx="100" cy="40" r="7" fill="#228B22" opacity="0.5" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3410;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Walking stick -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="url(#woodGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Handle curve -->
  <path d="M100,20 Q130,20 130,40" fill="none" stroke="url(#woodGrad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Wood grain lines -->
  <line x1="98" y1="40" x2="98" y2="170" stroke="#6B3410" stroke-width="1" opacity="0.5" />
  <line x1="102" y1="40" x2="102" y2="170" stroke="#6B3410" stroke-width="1" opacity="0.5" />
  
  <!-- Bottom tip -->
  <ellipse cx="100" cy="180" rx="6" ry="4" fill="#4A2A0A" />
</svg>
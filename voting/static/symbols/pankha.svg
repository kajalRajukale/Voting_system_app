<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3410;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Downrod -->
  <rect x="97" y="10" width="6" height="50" fill="#808080" stroke="#606060" stroke-width="1" />
  
  <!-- Motor housing -->
  <circle cx="100" cy="70" r="15" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2" />
  <circle cx="100" cy="70" r="8" fill="#FFC107" />
  
  <!-- Fan blades -->
  <g transform="rotate(0 100 70)">
    <ellipse cx="100" cy="30" rx="12" ry="40" fill="url(#bladeGrad)" stroke="#5D3A1A" stroke-width="1" />
    <ellipse cx="100" cy="35" rx="8" ry="30" fill="#A0522D" opacity="0.5" />
  </g>
  
  <g transform="rotate(120 100 70)">
    <ellipse cx="100" cy="30" rx="12" ry="40" fill="url(#bladeGrad)" stroke="#5D3A1A" stroke-width="1" />
    <ellipse cx="100" cy="35" rx="8" ry="30" fill="#A0522D" opacity="0.5" />
  </g>
  
  <g transform="rotate(240 100 70)">
    <ellipse cx="100" cy="30" rx="12" ry="40" fill="url(#bladeGrad)" stroke="#5D3A1A" stroke-width="1" />
    <ellipse cx="100" cy="35" rx="8" ry="30" fill="#A0522D" opacity="0.5" />
  </g>
  
  <!-- Blade brackets -->
  <rect x="92" y="62" width="16" height="8" rx="2" ry="2" fill="#B8860B" />
  
  <!-- Center cap -->
  <circle cx="100" cy="70" r="5" fill="#FFD700" stroke="#B8860B" stroke-width="1" />
  
  <!-- Mounting bracket -->
  <rect x="90" y="15" width="20" height="10" rx="2" ry="2" fill="#808080" />
  
  <!-- Pull chain -->
  <line x1="100" y1="85" x2="100" y2="110" stroke="#C0C0C0" stroke-width="1" />
  <circle cx="100" cy="112" r="3" fill="#FFD700" />
</svg>
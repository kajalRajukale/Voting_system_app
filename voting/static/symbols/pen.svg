<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#191970;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="rotate(-25 100 100)">
    <!-- Pen body -->
    <rect x="85" y="40" width="30" height="120" rx="2" ry="2" fill="url(#penGrad)" stroke="#000040" stroke-width="1" />
    
    <!-- Pen cap -->
    <rect x="82" y="25" width="36" height="25" rx="3" ry="3" fill="url(#capGrad)" stroke="#B8860B" stroke-width="1" />
    
    <!-- Cap clip -->
    <rect x="115" y="28" width="8" height="35" rx="2" ry="2" fill="#B8860B" />
    
    <!-- Pen grip section -->
    <rect x="88" y="130" width="24" height="20" fill="#191970" stroke="#000040" stroke-width="1" />
    
    <!-- Grip texture -->
    <line x1="90" y1="135" x2="110" y2="135" stroke="#000040" stroke-width="1" />
    <line x1="90" y1="140" x2="110" y2="140" stroke="#000040" stroke-width="1" />
    <line x1="90" y1="145" x2="110" y2="145" stroke="#000040" stroke-width="1" />
    
    <!-- Pen tip -->
    <polygon points="88,150 112,150 100,175" fill="#C0C0C0" stroke="#A0A0A0" stroke-width="1" />
    <polygon points="96,165 104,165 100,180" fill="#333333" />
    
    <!-- Gold band -->
    <rect x="85" y="125" width="30" height="8" fill="url(#capGrad)" />
  </g>
</svg>
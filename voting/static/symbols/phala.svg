<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F4F4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B3410;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Board frame -->
  <rect x="20" y="30" width="160" height="120" rx="5" ry="5" fill="url(#frameGrad)" stroke="#5D3A1A" stroke-width="3" />
  
  <!-- Board surface -->
  <rect x="30" y="40" width="140" height="100" fill="url(#boardGrad)" />
  
  <!-- Chalk marks -->
  <line x1="50" y1="60" x2="120" y2="60" stroke="#FFFFFF" stroke-width="2" opacity="0.7" />
  <line x1="50" y1="75" x2="140" y2="75" stroke="#FFFFFF" stroke-width="2" opacity="0.7" />
  <line x1="50" y1="90" x2="100" y2="90" stroke="#FFFFFF" stroke-width="2" opacity="0.7" />
  <line x1="50" y1="105" x2="130" y2="105" stroke="#FFFF00" stroke-width="2" opacity="0.7" />
  <line x1="50" y1="120" x2="110" y2="120" stroke="#FF69B4" stroke-width="2" opacity="0.7" />
  
  <!-- Chalk tray -->
  <rect x="30" y="140" width="140" height="10" fill="#A0522D" stroke="#5D3A1A" stroke-width="1" />
  
  <!-- Chalk pieces -->
  <rect x="60" y="138" width="20" height="6" rx="2" ry="2" fill="#FFFFFF" />
  <rect x="90" y="138" width="15" height="6" rx="2" ry="2" fill="#FFFF00" />
  <rect x="115" y="138" width="18" height="6" rx="2" ry="2" fill="#FF69B4" />
</svg>
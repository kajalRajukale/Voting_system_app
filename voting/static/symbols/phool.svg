<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stem -->
  <path d="M100,120 Q95,150 100,180" fill="none" stroke="url(#stemGrad)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Leaves -->
  <ellipse cx="85" cy="150" rx="20" ry="8" fill="#228B22" transform="rotate(-30 85 150)" />
  <ellipse cx="115" cy="140" rx="18" ry="7" fill="#32CD32" transform="rotate(25 115 140)" />
  
  <!-- Petals -->
  <ellipse cx="100" cy="60" rx="18" ry="25" fill="url(#petalGrad)" transform="rotate(0 100 85)" />
  <ellipse cx="100" cy="60" rx="18" ry="25" fill="url(#petalGrad)" transform="rotate(72 100 85)" />
  <ellipse cx="100" cy="60" rx="18" ry="25" fill="url(#petalGrad)" transform="rotate(144 100 85)" />
  <ellipse cx="100" cy="60" rx="18" ry="25" fill="url(#petalGrad)" transform="rotate(216 100 85)" />
  <ellipse cx="100" cy="60" rx="18" ry="25" fill="url(#petalGrad)" transform="rotate(288 100 85)" />
  
  <!-- Flower center -->
  <circle cx="100" cy="85" r="12" fill="#FFD700" />
  <circle cx="100" cy="85" r="6" fill="#FF8C00" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bambooGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Flute body -->
  <rect x="20" y="90" width="160" height="20" rx="10" ry="10" fill="url(#bambooGrad)" stroke="#A0522D" stroke-width="2" />
  
  <!-- Bamboo nodes -->
  <ellipse cx="50" cy="100" rx="3" ry="12" fill="#CD853F" />
  <ellipse cx="100" cy="100" rx="3" ry="12" fill="#CD853F" />
  <ellipse cx="150" cy="100" rx="3" ry="12" fill="#CD853F" />
  
  <!-- Finger holes -->
  <circle cx="65" cy="100" r="5" fill="#8B4513" />
  <circle cx="85" cy="100" r="5" fill="#8B4513" />
  <circle cx="115" cy="100" r="5" fill="#8B4513" />
  <circle cx="135" cy="100" r="5" fill="#8B4513" />
  
  <!-- Blow hole -->
  <ellipse cx="35" cy="95" rx="4" ry="3" fill="#8B4513" />
  
  <!-- Decorative bands -->
  <rect x="45" y="88" width="4" height="24" fill="#FFD700" opacity="0.7" />
  <rect x="95" y="88" width="4" height="24" fill="#FFD700" opacity="0.7" />
  <rect x="145" y="88" width="4" height="24" fill="#FFD700" opacity="0.7" />
</svg>
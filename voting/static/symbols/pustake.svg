<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="book1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B22222;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="book2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC3700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="book3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E55337;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bottom book -->
  <rect x="40" y="130" width="120" height="25" rx="2" ry="2" fill="url(#book1Grad)" stroke="#8B0000" stroke-width="2" />
  <rect x="42" y="132" width="4" height="21" fill="#8B0000" />
  <line x1="55" y1="142" x2="150" y2="142" stroke="#FFD700" stroke-width="1" />
  
  <!-- Middle book -->
  <rect x="45" y="105" width="115" height="25" rx="2" ry="2" fill="url(#book2Grad)" stroke="#CC3700" stroke-width="2" />
  <rect x="47" y="107" width="4" height="21" fill="#CC3700" />
  <line x1="60" y1="117" x2="150" y2="117" stroke="#FFD700" stroke-width="1" />
  
  <!-- Top book -->
  <rect x="50" y="80" width="110" height="25" rx="2" ry="2" fill="url(#book3Grad)" stroke="#E55337" stroke-width="2" />
  <rect x="52" y="82" width="4" height="21" fill="#E55337" />
  <line x1="65" y1="92" x2="150" y2="92" stroke="#FFD700" stroke-width="1" />
  
  <!-- Book spines decoration -->
  <rect x="40" y="135" width="120" height="3" fill="#FFD700" opacity="0.5" />
  <rect x="45" y="110" width="115" height="3" fill="#FFD700" opacity="0.5" />
  <rect x="50" y="85" width="110" height="3" fill="#FFD700" opacity="0.5" />
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000CD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pentagon -->
  <polygon points="100,20 180,75 150,170 50,170 20,75" 
           fill="url(#pentGrad)" stroke="#00008B" stroke-width="3" />
  
  <!-- Inner pentagon -->
  <polygon points="100,50 150,85 135,145 65,145 50,85" 
           fill="none" stroke="#87CEEB" stroke-width="2" opacity="0.5" />
  
  <!-- Center star -->
  <polygon points="100,70 105,85 120,85 108,95 112,110 100,102 88,110 92,95 80,85 95,85" 
           fill="#FFD700" stroke="#FFA500" stroke-width="1" />
  
  <!-- Corner dots -->
  <circle cx="100" cy="25" r="5" fill="#FF6347" />
  <circle cx="175" cy="78" r="5" fill="#FFD700" />
  <circle cx="145" cy="165" r="5" fill="#32CD32" />
  <circle cx="55" cy="165" r="5" fill="#FF69B4" />
  <circle cx="25" cy="78" r="5" fill="#9370DB" />
</svg>
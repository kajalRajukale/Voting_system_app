<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7F50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA07A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ringGrad1)" stroke-width="12" />
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#ringGrad2)" stroke-width="10" />
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="42" fill="none" stroke="url(#ringGrad3)" stroke-width="8" />
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="25" fill="#FF4500" />
  <circle cx="100" cy="100" r="15" fill="#FF6347" />
  <circle cx="100" cy="100" r="8" fill="#FFA07A" />
  
  <!-- Highlight -->
  <ellipse cx="85" cy="85" rx="8" ry="5" fill="#FFFFFF" opacity="0.3" transform="rotate(-30 85 85)" />
</svg>
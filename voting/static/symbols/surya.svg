<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sun rays -->
  <g fill="url(#rayGrad)">
    <polygon points="100,20 105,45 95,45" />
    <polygon points="100,180 105,155 95,155" />
    <polygon points="20,100 45,95 45,105" />
    <polygon points="180,100 155,95 155,105" />
    <polygon points="44,44 65,55 55,65" />
    <polygon points="156,44 135,55 145,65" />
    <polygon points="44,156 65,145 55,135" />
    <polygon points="156,156 135,145 145,135" />
    <polygon points="70,28 80,50 60,50" />
    <polygon points="130,28 120,50 140,50" />
    <polygon points="28,70 50,60 50,80" />
    <polygon points="170,70 150,60 150,80" />
    <polygon points="28,130 50,120 50,140" />
    <polygon points="170,130 150,120 150,140" />
    <polygon points="70,172 80,150 60,150" />
    <polygon points="130,172 120,150 140,150" />
  </g>
  
  <!-- Sun circle -->
  <circle cx="100" cy="100" r="45" fill="url(#sunGrad)" stroke="#FF8C00" stroke-width="2" />
  
  <!-- Sun face -->
  <circle cx="85" cy="90" r="5" fill="#B8860B" />
  <circle cx="115" cy="90" r="5" fill="#B8860B" />
  <path d="M80,110 Q100,130 120,110" fill="none" stroke="#B8860B" stroke-width="3" stroke-linecap="round" />
</svg>
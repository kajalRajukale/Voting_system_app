<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="tvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F2F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- TV body -->
  <rect x="30" y="50" width="140" height="100" rx="8" ry="8" fill="url(#tvGrad)" stroke="#404040" stroke-width="2" />
  
  <!-- Screen -->
  <rect x="40" y="60" width="120" height="80" rx="4" ry="4" fill="url(#screenGrad)" />
  
  <!-- Screen glare -->
  <ellipse cx="70" cy="80" rx="20" ry="15" fill="#FFFFFF" opacity="0.15" />
  
  <!-- TV controls -->
  <circle cx="165" cy="80" r="4" fill="#FF4500" />
  <circle cx="165" cy="95" r="3" fill="#FFD700" />
  <circle cx="165" cy="105" r="3" fill="#32CD32" />
  
  <!-- TV stand -->
  <rect x="70" y="150" width="60" height="10" rx="2" ry="2" fill="#404040" />
  <rect x="60" y="155" width="80" height="5" rx="2" ry="2" fill="#505050" />
  
  <!-- Antenna -->
  <line x1="80" y1="50" x2="60" y2="20" stroke="#C0C0C0" stroke-width="3" stroke-linecap="round" />
  <line x1="120" y1="50" x2="140" y2="20" stroke="#C0C0C0" stroke-width="3" stroke-linecap="round" />
  <circle cx="60" cy="20" r="3" fill="#FF4500" />
  <circle cx="140" cy="20" r="3" fill="#FF4500" />
</svg>